services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tour
      POSTGRES_PASSWORD: tour
      POSTGRES_DB: tour
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tour"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./server
    environment:
      DATABASE_URL: postgresql+psycopg://tour:tour@db:5432/tour
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      SEED_ON_BOOT: "true"
      UPLOAD_DIR: /app/uploads
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
